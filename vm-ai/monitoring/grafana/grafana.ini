[server]
http_addr = 0.0.0.0
http_port = 3000
domain = localhost
# Grafana is published on host port 3003; root_url must match so login/redirects
# and asset URLs resolve correctly when the operator opens http://localhost:3003.
root_url = http://localhost:3003/

[security]
admin_user = admin
admin_password = ${GF_SECURITY_ADMIN_PASSWORD}
disable_gravatar = true
disable_initial_admin_creation = false
cookie_secure = false
cookie_samesite = lax
allow_embedding = true

[users]
default_theme = dark

# Anonymous read-only access so the SOC dashboards are viewable without a login
# wall (admin login still required to edit). Without this, every panel sat behind
# a 302 redirect to /login -> "Grafana not getting information".
[auth.anonymous]
enabled = true
org_name = Main Org.
org_role = Viewer

[analytics]
reporting_enabled = false
check_for_updates = false

[metrics]
enabled = true

[paths]
data = /var/lib/grafana
logs = /var/log/grafana
plugins = /var/lib/grafana/plugins
provisioning = /etc/grafana/provisioning
