# Zeekctl configuration for the Robotics Security Platform lab.
#
# Tuned for a 1.5 GB RAM VM. Real production plants would use much larger
# rotation intervals and disk sinks.

# ---------- log management ----------
# rotate every hour, expire after 7 days (comments must be on their own line)
LogRotationInterval = 3600
LogExpireInterval = 7

# Keep .log files in /var/lab/log/zeek for downstream consumers (Stage 2).
LogDir = /var/lab/log/zeek

# ---------- spool / state ----------
SpoolDir = /var/lab/state/zeek-spool

# ---------- mail (disabled in lab) ----------
MailTo            = root@localhost
SendMail          =
MailAlarmsInterval= 24
MailAlarmsTo      =

# ---------- TimeMachine etc ----------
TimeMachineHost =

# ---------- minimal verbosity ----------
StatusCmdShowAll = 1
