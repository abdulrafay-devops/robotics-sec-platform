# ntopng configuration for the Robotics Security Platform lab.
#
# Rendered by infra/provision/vm-sec.sh:
#   @@SPAN_OT_IF@@   = NIC on vboxnet0 (OT zone)
#   @@SPAN_DMZ_IF@@  = NIC on vboxnet2 (DMZ)
#   @@MGMT_IF@@      = NIC on vboxnet3 (mgmt; web UI is bound here)

# ---------- interfaces to observe ----------
# We pass both SPAN interfaces; ntopng aggregates them into a unified view.
-i=@@SPAN_OT_IF@@
-i=@@SPAN_DMZ_IF@@

# ---------- web UI ----------
# Port 3001 chosen to avoid clashing with Grafana on port 3000 (Stage 6).
# Bind to the management interface IP (replaced with 0.0.0.0 in Docker)
-w=192.168.40.20:3001

# ---------- file system ----------
-d=/var/lib/ntopng
-G=/var/run/ntopng/ntopng.pid

# ---------- behavioural ----------
# Default credentials are 'admin' / 'admin' on first login; ntopng forces
# a password change. We don't preset a password in the config; that is
# enforced via the web UI on first run.

# ---------- DNS / community filtering ----------
--disable-autologout=1

# ---------- redis (remote) ----------
# ntopng uses the remote Redis in container-ai
-r=192.168.40.30:6379@0

# ---------- packet processing ----------
--zmq-encryption-key=
--local-networks="192.168.10.0/24,192.168.20.0/24,192.168.30.0/24,192.168.40.0/24"

# ---------- log level ----------
--verbose=2
