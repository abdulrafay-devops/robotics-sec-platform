server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        proxy_pass         http://container-ai:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        # API key is injected server-side by nginx via envsubst at container startup.
        # The browser never needs to know or send the key — the proxy adds it for every /api/ call.
        proxy_set_header   X-API-Key "${LAB_API_KEY}";
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    location /health {
        proxy_pass         http://container-ai:8000/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /score {
        proxy_pass         http://container-ai:8000/score;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /prometheus/ {
        proxy_pass         http://container-ai:9090/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 10s;
    }

    location /grafana/ {
        proxy_pass         http://container-ai:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    ssl_certificate     /etc/nginx/ssl/lab.crt;
    ssl_certificate_key /etc/nginx/ssl/lab.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        add_header X-Frame-Options "DENY";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        proxy_pass         http://container-ai:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-API-Key "${LAB_API_KEY}";
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    location /health {
        proxy_pass         http://container-ai:8000/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /score {
        proxy_pass         http://container-ai:8000/score;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location /prometheus/ {
        proxy_pass         http://container-ai:9090/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 10s;
    }

    location /grafana/ {
        proxy_pass         http://container-ai:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
