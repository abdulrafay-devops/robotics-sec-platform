#!/usr/sbin/nft -f
# router-fw forwarding policy — Purdue L3.5 IDMZ, DEFAULT-DENY.
#
# Only cross-zone (inter-bridge) traffic reaches this FORWARD chain; intra-zone
# traffic (e.g. AI<->dashboard, SEC->Redis on mgmt) stays on its own bridge and
# never hits the router. Everything not explicitly accepted below is dropped.
#
# NOTE: nftables is L3/L4 — it cannot read Modbus function codes. "AI read-only"
# is therefore enforced at the app layer: the AI never issues writes; operator
# writes go through the OT-resident control gateway. The router only gates which
# host:port pairs may talk at all.
#
# Zone subnets:  IT 192.168.20.0/24 · DMZ 192.168.30.0/24
#                MGMT 192.168.40.0/24 · OT 192.168.10.0/24 (internal, no internet)

flush ruleset

table inet idmz {
    chain forward {
        type filter hook forward priority filter; policy drop;

        # keep return traffic of allowed flows
        ct state established,related accept
        ct state invalid drop

        # ── allowed conduits ────────────────────────────────────────────────
        # 1. AI (mgmt) -> OT Modbus READ-ONLY PROXY only (5020). Direct PLC 502 is
        #    NOT allowed, so a compromised AI cannot reach the raw controller.
        ip saddr 192.168.40.0/24 ip daddr 192.168.10.10 tcp dport 5020 accept

        # 2. Operator control writes -> OT control gateway (gateway owns the PLC write)
        ip saddr 192.168.40.0/24 ip daddr 192.168.10.10 tcp dport 8002 accept

        # 3. Vendor jump host: Guacamole (DMZ) -> OT RDP only
        ip saddr 192.168.30.0/24 ip daddr 192.168.10.10 tcp dport 3389 accept

        # 4. Brokered deploy via DMZ artifact store (historian/store node = .30.40)
        ip saddr 192.168.20.0/24 ip daddr 192.168.30.40 tcp dport 80 accept   # IT publishes up
        ip saddr 192.168.10.0/24 ip daddr 192.168.30.40 tcp dport 80 accept   # OT pulls down

        # 5. CI webhook: Gitea (IT) -> AI webhook receiver (mgmt)
        ip saddr 192.168.20.0/24 ip daddr 192.168.40.30 tcp dport 9000 accept

        # 6. Read-only historian wall-board (DMZ) -> AI scoring API (mgmt), server-side
        ip saddr 192.168.30.40 ip daddr 192.168.40.30 tcp dport 8000 accept

        # 7. SEC (single-homed on OT) ships ML features to AI Redis. Scoped to SEC's
        #    host IP only, so no other OT host (incl. the PLC) can reach mgmt Redis.
        ip saddr 192.168.10.20 ip daddr 192.168.40.30 tcp dport 6379 accept

        # ── explicit drops (documentation; policy drop already covers them) ──
        # IT 20.x -> OT 10.x : DENY   |   OT 10.x -> Internet : DENY
        log prefix "IDMZ-FW-DROP " flags all counter drop
    }
}
